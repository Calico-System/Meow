services:

  # TFTP server — serves firmware and config files to the phone on boot
  tftp:
    image: palw3ey/ye3tftp
    network_mode: host
    restart: unless-stopped
    # network_mode: host is required for TFTP to work reliably.
    # TFTP is a two-phase UDP protocol: the client sends the initial RRQ to
    # port 69, but the server replies from a *random* ephemeral port (TID).
    # With Docker bridge networking only port 69 is published, so the server's
    # random-port replies are NATed back through a connection that the kernel
    # has no tracking entry for (this requires the nf_conntrack_tftp module,
    # which is not present on all hosts — notably TrueNAS/FreeBSD). The result
    # is that the initial request succeeds but every data packet is silently
    # dropped, causing transfers to time out. With host networking in.tftpd
    # binds directly to the host interface; no NAT is involved and both phases
    # of the TFTP exchange reach the phone correctly.
    #
    # The host-mounted /data volume is typically drwxrwx--- (0770), giving
    # "others" no access. in.tftpd drops privileges in --secure mode, so it
    # runs as an unprivileged user and gets "Permission denied" on the directory
    # and any files that aren't world-readable.
    #
    # This entrypoint wrapper runs before in.tftpd:
    #   chmod 755 /data   — makes the directory world-traversable
    #   chmod 644 /data/* — makes all served files world-readable (best-effort;
    #                        unmatched globs are suppressed and do not abort)
    #
    # Using a wildcard instead of listing specific extensions ensures that
    # firmware files (.sbn, .bin, .sb2, .tar, …) are covered alongside
    # config files (.cnf, .xml, .txt, …). Without this, in.tftpd's
    # unprivileged user gets "Access violation" on any unlisted extension.
    #
    # in.tftpd is run in the background (not via exec) and kept alive with
    # "wait". Running it as PID 1 via "exec" means any binding failure (e.g.
    # the OS still holding port 69 from a previous container restart) would
    # immediately kill the container. Running in background lets the script
    # emit log lines that TrueNAS's log viewer can display, and "wait" keeps
    # the container alive while propagating signals correctly.
    entrypoint:
      - sh
      - -c
      - |
        chmod 755 /data
        chmod 644 /data/* 2>/dev/null || true
        echo "Starting in.tftpd on 0.0.0.0:69"
        /usr/sbin/in.tftpd --foreground --secure --address 0.0.0.0:69 /data &
        TFTPD_PID=$!
        echo "in.tftpd running (PID ${TFTPD_PID})"
        wait ${TFTPD_PID}
    volumes:
      # Firmware, dialplan, and SIP config files
      - /mnt/pool/Apps/Calico/Meow/tftp:/data

  # Asterisk — internal PBX for Oak's line 1 and Calico component communication
  # Waits for the dashboard healthcheck to confirm configs are written before starting
  asterisk:
    image: andrius/asterisk
    network_mode: host
    restart: unless-stopped
    volumes:
      # Configs written here by fetch.py on startup
      - /mnt/pool/Apps/Calico/Meow/asterisk:/etc/asterisk
    command: asterisk -f
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      dashboard:
        condition: service_healthy

  # Meow — HTTP server, Discord bot, data fetcher
  # Writes Asterisk configs on startup before Asterisk reads them
  dashboard:
    image: python:3.12-alpine
    # Host networking is required so that the bot can reach Asterisk's AMI
    # socket on 127.0.0.1:5038 (Asterisk also runs with network_mode: host).
    # With bridge networking the container's 127.0.0.1 is its own loopback,
    # not the host's, so ami_connect() would silently fail every time.
    # The HTTP server (port 70) remains reachable from the LAN because it
    # binds to 0.0.0.0 directly on the host — no ports: mapping is needed.
    network_mode: host
    restart: unless-stopped
    volumes:
      # fetch.py lives in bot/
      - /mnt/pool/Apps/Calico/Meow/bot:/app
      # Static files (logo.bmp) and runtime output (speedtest cache)
      - /mnt/pool/Apps/Calico/Meow/http:/output
      # Shared volume for Asterisk config generation
      - /mnt/pool/Apps/Calico/Meow/asterisk:/etc/asterisk
    working_dir: /app
    command: python fetch.py
    env_file:
      # Copy .env.example to .env and fill in your values
      - /mnt/pool/Apps/Calico/Meow/.env
    # Signals readiness once fetch.py has finished writing Asterisk configs.
    # fetch.py writes /etc/asterisk/.configs_written after config generation
    # completes (or is skipped), so the asterisk service can depend on this.
    healthcheck:
      test: ["CMD", "test", "-f", "/etc/asterisk/.configs_written"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 120s
