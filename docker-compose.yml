services:

  # TFTP server — serves firmware and config files to the phone on boot
  tftp:
    image: palw3ey/ye3tftp
    network_mode: host
    restart: unless-stopped
    # network_mode: host is required: TFTP uses ephemeral reply ports that
    # bridge NAT can't track without nf_conntrack_tftp (absent on TrueNAS).
    # The entrypoint fixes /data permissions before starting in.tftpd so
    # it can read files as an unprivileged user in --secure mode.
    entrypoint:
      - sh
      - -c
      - |
        chmod 711 /data
        find /data -maxdepth 1 -type f -exec chmod 644 {} +
        echo "Starting in.tftpd on 0.0.0.0:69"
        /usr/sbin/in.tftpd --foreground --secure --address 0.0.0.0:69 /data &
        TFTPD_PID=$!
        echo "in.tftpd started (PID ${TFTPD_PID})"
        trap 'echo "Forwarding termination signal to in.tftpd (${TFTPD_PID})"; kill -TERM "${TFTPD_PID}" 2>/dev/null; wait "${TFTPD_PID}"; exit $?' TERM INT
        wait ${TFTPD_PID}
        EXIT_STATUS=$?
        if [ "${EXIT_STATUS}" -ne 0 ]; then
          echo "in.tftpd exited with status ${EXIT_STATUS}"
        fi
        exit "${EXIT_STATUS}"
    volumes:
      # Firmware, dialplan, and SIP config files
      - /mnt/pool/Apps/Calico/Meow/tftp:/data

  # Asterisk — internal PBX for Oak's line 1 and Calico component communication
  # Waits for the dashboard healthcheck to confirm configs are written before starting
  asterisk:
    image: andrius/asterisk
    network_mode: host
    restart: unless-stopped
    volumes:
      # Configs written here by fetch.py on startup
      - /mnt/pool/Apps/Calico/Meow/asterisk:/etc/asterisk
    command: asterisk -f
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      dashboard:
        condition: service_healthy

  # Meow — HTTP server, Discord bot, data fetcher
  # Writes Asterisk configs on startup before Asterisk reads them
  dashboard:
    image: python:3.12-alpine
    # network_mode: host is required: the bot must reach Asterisk's AMI on
    # 127.0.0.1:5038, and the HTTP server binds 0.0.0.0:70 directly on the host.
    network_mode: host
    restart: unless-stopped
    volumes:
      # fetch.py lives in bot/
      - /mnt/pool/Apps/Calico/Meow/bot:/app
      # Static files (logo.bmp) and runtime output (speedtest cache)
      - /mnt/pool/Apps/Calico/Meow/http:/output
      # Shared volume for Asterisk config generation
      - /mnt/pool/Apps/Calico/Meow/asterisk:/etc/asterisk
    working_dir: /app
    command: python fetch.py
    env_file:
      # Copy .env.example to .env and fill in your values
      - /mnt/pool/Apps/Calico/Meow/.env
    # Signals readiness once fetch.py has finished writing Asterisk configs.
    # fetch.py writes /etc/asterisk/.configs_written after config generation
    # completes (or is skipped), so the asterisk service can depend on this.
    healthcheck:
      test: ["CMD", "test", "-f", "/etc/asterisk/.configs_written"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 120s
